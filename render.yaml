services:
  - type: web
    name: fastapi-clean-arch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn presentation.main:app --app-dir src --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_ECHO
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: fastapi-clean-arch-db
          property: connectionString

databases:
  - name: fastapi-clean-arch-db
    plan: free
    databaseName: fastapi_clean_arch
